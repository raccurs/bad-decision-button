<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>bad decision button</title>
  <style>
    body {
      text-align: center;
      background: black;
      color: white;
    }
    h2 {
   font-size: 8vw;
   margin-top: 20px;
   font-weight: bold;
   letter-spacing: 3px;
   text-transform: uppercase;
    }
    img {
    width: 85vw;
    height: 65vh;
    object-fit: contain;
    margin-top: 20px;
    border-radius: 12px;
    }
    button {
     margin-top: 20px;
     padding: 16px;
     font-size: 5vw;
     border-radius: 16px;
     width: 80vw;
     max-width: 400px;
     background: white;
     color: black;
     font-weight: bold;
    }
  </style>
</head>
<body>

<h2>bad decision button</h2>

<img id="image" src="">

<br>
<button onclick="randomImage()">make a bad decision</button>

<script>
let images = [];

fetch('images.json')
  .then(response => response.json())
  .then(data => {
    images = data;
    randomImage(); // ✅ 等数据回来再执行
  })
  .catch(err => console.error("加载失败:", err));

function randomImage() {
  if (images.length === 0) {
    console.log("图片还没加载好");
    return;
  }
  const index = Math.floor(Math.random() * images.length);
  document.getElementById("image").src = images[index];
}
</script>


</body>
</html>
