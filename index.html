<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>bad decision button</title>
  <style>
    body {
      text-align: center;
      background: black;
      color: white;
    }
    img {
      max-width: 90%;
      margin-top: 20px;
      border-radius: 10px;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h2>bad decision button</h2>

<img id="image" src="">

<br>
<button onclick="randomImage()">make a bad decision</button>

<script>
let images = [];

fetch('images.json')
  .then(response => response.json())
  .then(data => {
    images = data;
    randomImage(); // ✅ 等数据回来再执行
  })
  .catch(err => console.error("加载失败:", err));

function randomImage() {
  if (images.length === 0) {
    console.log("图片还没加载好");
    return;
  }
  const index = Math.floor(Math.random() * images.length);
  document.getElementById("image").src = images[index];
}
</script>


</body>
</html>
